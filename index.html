<script>
// ─── SCREEN NAV ───
function showScreen(id, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  btn.classList.add('active');
}

// ─── DAY SWITCHER ───
function showDay(day, tabEl) {
  document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.day-tab').forEach(t => t.className = 'day-tab');
  document.getElementById('day-' + day).classList.add('active');
  tabEl.classList.add('act-' + day);
  updateProgress();
}

// ─── TOGGLE EXERCISE ───
function toggleEx(card) {
  const wasOpen = card.classList.contains('open');
  card.classList.toggle('open');
  if (!wasOpen) {
    const loggerEl = card.querySelector('.logger');
    if (loggerEl && loggerEl.children.length === 0) buildLogger(loggerEl);
  }
}

// ─── BUILD SET LOGGER ───
function buildLogger(el) {
  const n = parseInt(el.dataset.sets) || 3;
  const head = document.createElement('div');
  head.className = 'logger-head';
  head.innerHTML = '<span class="lh-set">Set</span><span class="lh-weight">Weight (lbs)</span><span class="lh-reps">Reps</span><span class="lh-done"></span>';
  el.appendChild(head);

  for (let i = 1; i <= n; i++) {
    const row = document.createElement('div');
    row.className = 'set-row';
    row.innerHTML = `
      <div class="set-num">${i}</div>
      <input class="set-input" type="number" inputmode="decimal" placeholder="lbs" />
      <input class="set-input" type="number" inputmode="numeric" placeholder="reps" />
      <button class="set-check" onclick="toggleCheck(this)">✓</button>
    `;
    el.appendChild(row);
  }
}

function toggleCheck(btn) {
  btn.classList.toggle('done');
  updateProgress();
  updateTotalDone();
}

// ─── PROGRESS ───
function updateProgress() {
  const activePanelId = document.querySelector('.day-panel.active')?.id;
  if (!activePanelId) return;
  const panel = document.getElementById(activePanelId);
  const total = panel.querySelectorAll('.set-check').length;
  const done = panel.querySelectorAll('.set-check.done').length;
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-txt').textContent = done + ' / ' + total + ' sets';
}

function updateTotalDone() {
  const done = document.querySelectorAll('.set-check.done').length;
  document.getElementById('total-done').textContent = done;
}

// ─── WEIGHT LOG ───
let weights = JSON.parse(localStorage.getItem('vtaper-weights') || '[]');

function logWeight() {
  const input = document.getElementById('w-input');
  const val = parseFloat(input.value);
  if (!val || val < 100 || val > 400) return;
  weights.push({ date: new Date().toLocaleDateString(), w: val });
  if (weights.length > 12) weights = weights.slice(-12);
  localStorage.setItem('vtaper-weights', JSON.stringify(weights));
  input.value = '';
  renderWeights();
}

function renderWeights() {
  if (weights.length === 0) return;
  const latest = weights[weights.length - 1].w;
  const start = 198;
  const lost = Math.max(0, start - latest).toFixed(1);

  document.getElementById('cw-display').textContent = latest;
  document.getElementById('curr-w-stat').textContent = latest;
  document.getElementById('lost-stat').textContent = lost;

  const empty = document.getElementById('chart-empty');
  const canvas = document.getElementById('weightChart');

  if (weights.length < 2) {
    empty.textContent = 'Add more weigh-ins to see your trend';
    canvas.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  canvas.style.display = 'block';
  drawChart(canvas, weights);
}

function drawChart(canvas, data) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth || 300;
  const H = 80;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const vals = data.map(d => d.w);
  const minV = Math.min(...vals) - 2;
  const maxV = Math.max(...vals) + 2;
  const pad = { l: 8, r: 8, t: 8, b: 8 };
  const w = W - pad.l - pad.r;
  const h = H - pad.t - pad.b;

  const px = (i) => pad.l + (i / (data.length - 1)) * w;
  const py = (v) => pad.t + h - ((v - minV) / (maxV - minV)) * h;

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.t, 0, H - pad.b);
  grad.addColorStop(0, 'rgba(0,230,118,0.25)');
  grad.addColorStop(1, 'rgba(0,230,118,0)');

  ctx.beginPath();
  ctx.moveTo(px(0), py(vals[0]));
  for (let i = 1; i < vals.length; i++) ctx.lineTo(px(i), py(vals[i]));
  ctx.lineTo(px(vals.length - 1), H);
  ctx.lineTo(px(0), H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#00e676';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.moveTo(px(0), py(vals[0]));
  for (let i = 1; i < vals.length; i++) ctx.lineTo(px(i), py(vals[i]));
  ctx.stroke();

  // Dots
  vals.forEach((v, i) => {
    ctx.beginPath();
    ctx.arc(px(i), py(v), 3, 0, Math.PI * 2);
    ctx.fillStyle = '#00e676';
    ctx.fill();
  });
}

// ─── INIT ───
renderWeights();
</script>
